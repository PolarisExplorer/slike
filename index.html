<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Kalkulator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      height: 100dvh;
      overflow: hidden;
      background: #0d0d14;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      padding: 10px 14px 12px;
      gap: 8px;
      max-width: 480px;
      margin: 0 auto;
    }

    /* TOP BAR */
    .topbar { display: flex; justify-content: flex-end; flex-shrink: 0; }
    .settings-btn {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 9px;
      color: #8896a8;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 6px 13px;
      cursor: pointer;
    }

    /* MODAL */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #1a1a28;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 22px 20px;
      width: 100%;
      max-width: 340px;
    }
    .modal-title {
      color: #8896a8;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.8px;
      margin-bottom: 14px;
    }
    .modal .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .modal-close {
      width: 100%;
      margin-top: 16px;
      padding: 11px;
      border-radius: 11px;
      border: none;
      background: #d4a843;
      color: #0d0d14;
      font-size: 0.92rem;
      font-weight: 800;
      cursor: pointer;
    }

    .slabel {
      color: #8896a8;
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.6px;
      margin-bottom: 6px;
      flex-shrink: 0;
    }

    input[type="number"] {
      width: 100%;
      padding: 10px 14px;
      border-radius: 11px;
      border: 1.5px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      outline: none;
      -webkit-appearance: none;
      transition: border 0.2s;
    }
    input:focus { border-color: #d4a843; background: rgba(255,255,255,0.08); }
    input::placeholder { color: #3d4a5a; font-weight: 400; font-size: 0.88rem; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }

    /* PHOTOS BLOCK */
    .photos-block {
      flex-shrink: 0;
      background: #161622;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 12px 14px;
    }

    .photos-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    /* Narrow input — samo za 3 cifre */
    .photos-input-wrap { flex-shrink: 0; width: 90px; }
    .photos-input {
      font-size: 2rem !important;
      font-weight: 800 !important;
      text-align: center;
      padding: 8px 6px !important;
      border-radius: 10px !important;
      letter-spacing: 2px;
      width: 90px !important;
    }

    /* Total — desno od inputa, veci i citljiviji */
    .totals-inline {
      flex: 1;
      display: none;
      flex-direction: column;
      gap: 4px;
    }
    /* Veliki RSD prikaz */
    .ti-rsd {
      color: #d4a843;
      font-size: 1.65rem;
      font-weight: 800;
      line-height: 1;
      letter-spacing: 0.5px;
    }
    .ti-eur {
      color: #5ba4cf;
      font-size: 0.88rem;
      font-weight: 700;
    }

    /* PAYMENT BLOCK */
    .payment-block {
      flex: 1;
      display: none;
      flex-direction: column;
      gap: 7px;
      background: #161622;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 12px 14px;
      min-height: 0;
    }

    /* Tabs */
    .tabs {
      display: flex;
      background: rgba(255,255,255,0.04);
      border-radius: 10px;
      padding: 3px;
      gap: 3px;
      flex-shrink: 0;
    }
    .tab {
      flex: 1;
      padding: 8px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: #8896a8;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab.active { background: #d4a843; color: #0d0d14; }

    /* Apoeni */
    .apoeni-label {
      color: #8896a8;
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.3px;
      flex-shrink: 0;
    }
    .apoeni-grid { display: grid; gap: 6px; flex-shrink: 0; }
    .apoeni-grid.rsd { grid-template-columns: repeat(3, 1fr); }
    .apoeni-grid.eur { grid-template-columns: repeat(5, 1fr); }

    .apon-btn {
      padding: 10px 4px;
      border-radius: 10px;
      border: 1.5px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: #c8d6e5;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      transition: all 0.12s;
      user-select: none;
    }
    .apon-btn:active { transform: scale(0.93); }
    .rsd .apon-btn { border-color: rgba(91,164,207,0.2); }
    .rsd .apon-btn:active { background: rgba(91,164,207,0.2); color: #5ba4cf; }
    .eur .apon-btn { border-color: rgba(104,211,145,0.2); }
    .eur .apon-btn:active { background: rgba(104,211,145,0.2); color: #68d391; }

    /* Received */
    .received-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      background: rgba(255,255,255,0.04);
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 9px 12px;
    }
    .rb-inner { flex: 1; }
    .rb-label { color: #8896a8; font-size: 0.68rem; font-weight: 600; }
    .rb-value { color: #fff; font-size: 1.25rem; font-weight: 800; line-height: 1.2; }
    .clear-btn {
      background: rgba(229,62,62,0.1);
      border: 1.5px solid rgba(229,62,62,0.22);
      border-radius: 8px;
      color: #fc8181;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 6px 10px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .clear-btn:active { background: rgba(229,62,62,0.22); }

    /* Manual */
    .manual-row { display: flex; gap: 7px; flex-shrink: 0; }
    .manual-row input {
      flex: 1;
      font-size: 0.88rem !important;
      font-weight: 600 !important;
      padding: 9px 12px !important;
    }
    .manual-row button {
      padding: 9px 14px;
      border-radius: 10px;
      border: 1.5px solid rgba(212,168,67,0.35);
      background: rgba(212,168,67,0.1);
      color: #d4a843;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .manual-row button:active { background: rgba(212,168,67,0.22); }

    /* Results */
    .result-box {
      border-radius: 12px;
      padding: 10px 14px;
      display: none;
      flex-shrink: 0;
    }
    .result-box.green { background: rgba(56,178,72,0.12);  border: 1.5px solid rgba(56,178,72,0.3); }
    .result-box.teal  { background: rgba(104,211,145,0.1); border: 1.5px solid rgba(104,211,145,0.28); }
    .result-box.red   { background: rgba(229,62,62,0.1);   border: 1.5px solid rgba(229,62,62,0.3); }

    .rl { color: #8896a8; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.3px; }
    .rv { font-size: 1.5rem; font-weight: 800; color: #fff; line-height: 1.2; }
    .rs { color: #8896a8; font-size: 0.78rem; margin-top: 1px; }

    /* Reset */
    .reset-btn {
      width: 100%;
      padding: 10px;
      border-radius: 11px;
      border: 1.5px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: #8896a8;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: auto;
    }
    .reset-btn:active { background: rgba(255,255,255,0.09); }
  </style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <button class="settings-btn" onclick="toggleModal()">Podesavanja</button>
  </div>

  <!-- SETTINGS MODAL -->
  <div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
    <div class="modal">
      <div class="modal-title">Podesavanja</div>
      <div class="row2">
        <div>
          <label style="color:#8896a8;font-size:0.75rem;font-weight:600;display:block;margin-bottom:5px;">Cijena / slika (RSD)</label>
          <input type="number" inputmode="numeric" id="pricePerPhoto" value="300" min="1"/>
        </div>
        <div>
          <label style="color:#8896a8;font-size:0.75rem;font-weight:600;display:block;margin-bottom:5px;">1 EUR = ? RSD</label>
          <input type="number" inputmode="decimal" id="exchangeRate" value="117" min="1" step="0.01"/>
        </div>
      </div>
      <button class="modal-close" onclick="toggleModal()">Sacuvaj</button>
    </div>
  </div>

  <!-- BROJ SLIKA -->
  <div class="photos-block">
    <div class="slabel">Broj fotografija</div>
    <div class="photos-row">
      <div class="photos-input-wrap">
        <input class="photos-input" type="number" inputmode="numeric" pattern="[0-9]*"
               id="numPhotos" min="1" placeholder="0" oninput="calculateTotal()"/>
      </div>
      <div class="totals-inline" id="totals-inline">
        <div class="ti-rsd" id="display-rsd">—</div>
        <div class="ti-eur" id="display-eur">—</div>
      </div>
    </div>
  </div>

  <!-- PAYMENT BLOCK -->
  <div class="payment-block" id="payment-block">
    <div class="slabel">Placanje i Kusur</div>

    <div class="tabs">
      <button class="tab active" id="tab-rsd" onclick="setCurrency('RSD')">Dinari (RSD)</button>
      <button class="tab" id="tab-eur" onclick="setCurrency('EUR')">Euri (EUR)</button>
    </div>

    <div class="apoeni-label">Klikni apoene</div>

    <div id="apoeni-rsd">
      <div class="apoeni-grid rsd">
        <button class="apon-btn" onclick="addAmount(100)">100</button>
        <button class="apon-btn" onclick="addAmount(200)">200</button>
        <button class="apon-btn" onclick="addAmount(500)">500</button>
        <button class="apon-btn" onclick="addAmount(1000)">1.000</button>
        <button class="apon-btn" onclick="addAmount(2000)">2.000</button>
        <button class="apon-btn" onclick="addAmount(5000)">5.000</button>
      </div>
    </div>
    <div id="apoeni-eur" style="display:none;">
      <div class="apoeni-grid eur">
        <button class="apon-btn" onclick="addAmount(5)">5</button>
        <button class="apon-btn" onclick="addAmount(10)">10</button>
        <button class="apon-btn" onclick="addAmount(20)">20</button>
        <button class="apon-btn" onclick="addAmount(50)">50</button>
        <button class="apon-btn" onclick="addAmount(100)">100</button>
      </div>
    </div>

    <div class="received-row">
      <div class="rb-inner">
        <div class="rb-label" id="rb-label">Primljeno (RSD)</div>
        <div class="rb-value" id="rb-value">0</div>
      </div>
      <button class="clear-btn" onclick="clearAmount()">Obrisi</button>
    </div>

    <div class="manual-row">
      <input type="number" inputmode="decimal" id="manualInput" placeholder="Ili unesi rucno..."/>
      <button onclick="addManual()">Dodaj</button>
    </div>

    <!-- Kusur -->
    <div class="result-box green" id="result-kusur">
      <div class="rl">Kusur za vracanje</div>
      <div class="rv" id="kusur-value">—</div>
      <div class="rs" id="kusur-sub"></div>
    </div>

    <!-- Tacno -->
    <div class="result-box teal" id="result-tacno">
      <div class="rl">Status</div>
      <div class="rv" style="font-size:1.1rem; color:#68d391;">Nema kusura!</div>
    </div>

    <!-- Fali jos — prikazuje koliko nedostaje -->
    <div class="result-box red" id="result-fali">
      <div class="rl">Jos fali</div>
      <div class="rv" id="fali-value">—</div>
      <div class="rs" id="fali-sub"></div>
    </div>

    <button class="reset-btn" onclick="resetAll()">Nova transakcija</button>
  </div>

</div>
<script>
  let selectedCurrency = 'RSD';
  let collectedAmount = 0;

  function toggleModal() { document.getElementById('modal-overlay').classList.toggle('open'); }
  function closeModalOutside(e) { if (e.target===document.getElementById('modal-overlay')) toggleModal(); }

  function getPrice() { return parseFloat(document.getElementById('pricePerPhoto').value) || 300; }
  function getRate()  { return parseFloat(document.getElementById('exchangeRate').value) || 117; }

  function calculateTotal() {
    const n = parseInt(document.getElementById('numPhotos').value);
    const pb = document.getElementById('payment-block');
    const ti = document.getElementById('totals-inline');
    if (!n || n < 1) { pb.style.display='none'; ti.style.display='none'; return; }
    const totalRSD = n * getPrice();
    document.getElementById('display-rsd').textContent = fmtRSD(totalRSD);
    document.getElementById('display-eur').textContent  = fmtEUR(totalRSD / getRate());
    ti.style.display = 'flex';
    pb.style.display = 'flex';
    clearAmount();
  }

  function setCurrency(cur) {
    selectedCurrency = cur;
    document.getElementById('tab-rsd').classList.toggle('active', cur==='RSD');
    document.getElementById('tab-eur').classList.toggle('active', cur==='EUR');
    document.getElementById('apoeni-rsd').style.display = cur==='RSD' ? 'block' : 'none';
    document.getElementById('apoeni-eur').style.display = cur==='EUR' ? 'block' : 'none';
    document.getElementById('rb-label').textContent = cur==='RSD' ? 'Primljeno (RSD)' : 'Primljeno (EUR)';
    clearAmount();
  }

  function addAmount(val) { collectedAmount += val; updateDisplay(); calcChange(); }

  function addManual() {
    const inp = document.getElementById('manualInput');
    const val = parseFloat(inp.value);
    if (!isNaN(val) && val > 0) { collectedAmount += val; inp.value = ''; updateDisplay(); calcChange(); }
  }

  function clearAmount() {
    collectedAmount = 0;
    document.getElementById('manualInput').value = '';
    updateDisplay();
    hideResults();
  }

  function updateDisplay() {
    document.getElementById('rb-value').textContent =
      selectedCurrency === 'RSD' ? fmtRSD(collectedAmount) : fmtEUR(collectedAmount);
  }

  function calcChange() {
    const n = parseInt(document.getElementById('numPhotos').value);
    if (!n) { hideResults(); return; }
    const totalRSD = n * getPrice();
    const rate = getRate();
    const paidRSD = selectedCurrency === 'RSD' ? collectedAmount : collectedAmount * rate;
    const diff = paidRSD - totalRSD;

    hideResults();

    if (collectedAmount <= 0) return;

    if (Math.abs(diff) < 0.5) {
      document.getElementById('result-tacno').style.display = 'block';
    } else if (diff > 0) {
      document.getElementById('kusur-value').textContent = fmtRSD(diff);
      document.getElementById('kusur-sub').textContent = 'Priblizno ' + fmtEUR(diff / rate);
      document.getElementById('result-kusur').style.display = 'block';
    } else {
      // Fali jos
      const fali = Math.abs(diff);
      document.getElementById('fali-value').textContent = fmtRSD(fali);
      document.getElementById('fali-sub').textContent = 'Priblizno ' + fmtEUR(fali / rate);
      document.getElementById('result-fali').style.display = 'block';
    }
  }

  function hideResults() {
    document.getElementById('result-kusur').style.display = 'none';
    document.getElementById('result-tacno').style.display = 'none';
    document.getElementById('result-fali').style.display  = 'none';
  }

  function resetAll() {
    document.getElementById('numPhotos').value = '';
    document.getElementById('payment-block').style.display = 'none';
    document.getElementById('totals-inline').style.display = 'none';
    clearAmount();
    setCurrency('RSD');
  }

  function fmtRSD(n) {
    return new Intl.NumberFormat('sr-RS',{style:'currency',currency:'RSD',minimumFractionDigits:0,maximumFractionDigits:0}).format(n);
  }
  function fmtEUR(n) {
    return new Intl.NumberFormat('de-DE',{style:'currency',currency:'EUR',minimumFractionDigits:2,maximumFractionDigits:2}).format(n);
  }

  document.getElementById('manualInput').addEventListener('keydown', e => { if (e.key==='Enter') addManual(); });
</script>
</body>
</html>
